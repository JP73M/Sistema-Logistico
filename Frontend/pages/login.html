<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="../assets/img/Logo_D_White.png">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body class="background">


    <div class="login-container">


        <img 
        class="logo_login"
        src="../assets/img/Logo_D_Blue-removebg-preview.png" 
        alt="Logo">


        <div class="login-form">


            <div class="input-box">

                <input
                type="text"
                placeholder="Usuario">

                <img class="input-icon" src="../assets/icons/user.png" alt="Usuario">

            </div>



            <div class="input-box">

                <input
                type="password"
                placeholder="Contraseña">

                <img class="input-icon" src="../assets/icons/key.png" alt="password">

            </div>



            <button class="btn-login">
                Ingresar
            </button>


        </div>


    </div>


</body>
</html>
