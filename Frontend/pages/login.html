<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="../assets/img/Logo_D_White.png">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body class="background">


    <div class="login-card">


        <img 
        class="logo_login"
        src="../assets/img/Logo_D_Blue-removebg-preview.png"
        alt="logo">


        <div class="login-form">


            <div class="input-box">

                <input 
                type="text"
                placeholder="Usuario">

                <img 
                class="input-icon"
                src="../assets/icons/user.png">

            </div>



            <div class="input-box">

                <input 
                type="password"
                placeholder="Contraseña">

                <img 
                class="input-icon"
                src="../assets/icons/key.png">

            </div>



            <button 
                class="btn-login"
                onclick="login()">

                Ingresar

            </button>

        </div>


    </div>

    <script src="../assets/js/login.js"></script>

</body>
</html>
