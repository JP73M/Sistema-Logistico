<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" href="../assets/img/Logo_D_White.png">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>
    
    <div class="dashboard">


        <aside class="sidebar">

           <div class="logo_sidebar">
                <img src="../assets/img/Logo-Complete-Blue.png" alt="">
           </div>

           <nav>

             <a class="active" href=""><img src="../assets/img/icons/Home.png" alt="">Dashboard</a>

             <a class="active" href=""><img src="../assets/img/icons/Docs.png" alt="">Historial</a>

             <a class="active" href=""><img src="../assets/img/icons/Truck.png" alt="">Manifiestos</a>

             <a class="active" href=""><img src="../assets/icons/user.png" alt="">Usuarios</a>

             <a class="active" href=""><img src="../assets/img/icons/Report.png" alt="">Reportes</a>

             <a class="active" href=""><img src="../assets/img/icons/Configuration.png" alt="">Configuracion</a>
           </nav>

           <div class="logout">
                <a class="active" onclick="logout()"><img src="../assets/img/icons/Logout.png" alt="">Cerrar sesion</a>
           </div>

            <span class="span">
                Versión 1.0.0
            </span>

        </aside>


        <main class="content">

            <header class="header">


                <div class="header-title">

                    <h1>Dashboard</h1>

                    <p>Bienvenido, Juan Melo</p>

                </div>



                <div class="header-user">


                    <div class="notification">

                        <img 
                        src="../assets/img/icons/notificacion.png" 
                        alt="">

                    </div>



                    <div class="avatar">

                        JM

                    </div>



                    <div class="user-info">

                        <div class="user-name">

                            <h4>Juan Melo</h4>

                            <img src="../assets/img/icons/arrow.png" alt="">

                        </div>

                        <span>Operador</span>

                    </div>

                    


                </div>


            </header>
            


        </main>
    </div>


    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
